  window.hidePride = function() {
    wrap.style.display = 'none';
    document.documentElement.style.backgroundColor = '';
    clearBg('');
    if (window.ControlsAPI) {
      window.ControlsAPI.set('whitewash_mode', true);
      window.ControlsAPI.set('bw_mode', true);
    }
    animRunning = false;
  };

  window.addEventListener('resize', () => { if (animRunning) resize(); });

  window.addEventListener('load', () => {
    const isPride = localStorage.getItem('obys-color-mode') === 'calm';
    if (!isPride) return;
    setTimeout(() => {
      if (window.ControlsAPI) {
        window.ControlsAPI.set('whitewash_mode', false);
        window.ControlsAPI.set('bw_mode', false);
      }
    }, 800);
  });
})();
</script>

<script>
window.addEventListener("load", () => {
  if (window.innerWidth <= 1199) return;
  const toggle = document.querySelector(".color-toggle");
  const underline = document.querySelector(".mode-underline");
  const colorText = document.querySelector(".mode-active");
  const calmText = document.querySelector(".mode-inactive");
  const STORAGE_KEY = "obys-color-mode";
  let isCalm = localStorage.getItem(STORAGE_KEY) === "calm";

  function setBackground(color) {
    document.body.style.backgroundColor = color;
    const pageWrapper = document.querySelector(".page-wrapper");
    const mainFrame = document.querySelector(".main-frame");
    if (pageWrapper) pageWrapper.style.backgroundColor = color;
    if (mainFrame) mainFrame.style.backgroundColor = color;
  }

  function moveUnderlineTo(target) {
    if (!underline || !target) return;
    underline.style.left = `${target.offsetLeft}px`;
    underline.style.width = `${target.offsetWidth}px`;
  }

  function applyMode() {
    if (isCalm) {
      moveUnderlineTo(calmText);
      if (window.showPride) window.showPride();
    } else {
      moveUnderlineTo(colorText);
      if (window.hidePride) window.hidePride();
      setBackground("#FFFFFF");
    }
  }

  applyMode();
  if (!toggle) return;
  toggle.addEventListener("click", () => {
    isCalm = !isCalm;
    localStorage.setItem(STORAGE_KEY, isCalm ? "calm" : "color");
    applyMode();
  });
});
</script>

<script>
if (window.innerWidth > 1199) {
  const lineFill = document.querySelector(".preloader-line-fill");
  const percent = document.querySelector(".preloader-percent");
  const duration = 4000;
  const startTime = performance.now();

  gsap.to([".preloader-title", ".preloader-percent", ".preloader-line"], {
    opacity: 1, duration: 0.8, ease: "power2.out"
  });

  function animateFakeLoader(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const value = progress * 100;
    if (lineFill) lineFill.style.width = value + "%";
    if (percent) percent.textContent = value.toFixed(0);
    if (progress < 1) requestAnimationFrame(animateFakeLoader);
  }

  requestAnimationFrame(animateFakeLoader);

  setTimeout(() => {
    gsap.to([".preloader-title", ".preloader-percent", ".preloader-line"], {
      opacity: 0, duration: 0.25, ease: "power2.out",
      onComplete: () => {
        gsap.set([".preloader-title", ".preloader-percent", ".preloader-line"], { display: "none" });
      }
    });
  }, 4050);

  setTimeout(() => {
    gsap.to(".preloader-top", { yPercent: -100, duration: 1.2, ease: "expo.inOut" });
    gsap.to(".preloader-bottom", { yPercent: 100, duration: 1.2, ease: "expo.inOut" });
    gsap.set(".preloader", { pointerEvents: "none", display: "none", delay: 1.4 });
  }, 4300);
}
</script>

<script>
window.addEventListener("load", () => {
  const timeElement = document.querySelector(".local-time");
  if (!timeElement) return;
  function updateCESTTime() {
    const time = new Intl.DateTimeFormat("en-US", {
      timeZone: "Europe/Warsaw", hour: "numeric", minute: "2-digit", hour12: true
    }).format(new Date());
    timeElement.textContent = `CEST ${time}`;
  }
  updateCESTTime();
  setInterval(updateCESTTime, 1000);
});
</script>

<script>
window.addEventListener("DOMContentLoaded", () => {
  const EMAIL = "info@obys.agency";
  const copyButtons = document.querySelectorAll(".copy-email");
  copyButtons.forEach((button) => {
    const originalText = button.textContent.trim() || "Contact";
    button.addEventListener("click", async (e) => {
      e.preventDefault();
      e.stopPropagation();
      try {
        await navigator.clipboard.writeText(EMAIL);
      } catch (err) {
        const tempInput = document.createElement("input");
        tempInput.value = EMAIL;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
      }
      button.textContent = "Copied";
      setTimeout(() => { button.textContent = originalText; }, 2000);
    });
  });
});
</script>

<script>
window.addEventListener("DOMContentLoaded", () => {
  if (typeof gsap === "undefined") return;
  const overlay = document.querySelector(".page-transition-overlay");
  if (!overlay) return;
  const currentPath = window.location.pathname;
  const direction = sessionStorage.getItem("obys-transition-direction");
  gsap.set(overlay, { display: "block", yPercent: direction ? 0 : -100 });
  if (direction) {
    sessionStorage.removeItem("obys-transition-direction");
    gsap.to(overlay, {
      yPercent: direction === "down" ? 100 : -100,
      duration: 0.85, ease: "power4.inOut", delay: 0.05
    });
  }
  document.querySelectorAll("a[href='/'], a[href='/about']").forEach((link) => {
    link.addEventListener("click", (e) => {
      const href = link.getAttribute("href");
      if (!href || href === currentPath) return;
      e.preventDefault();
      const goingToAbout = href.includes("about");
      sessionStorage.setItem("obys-transition-direction", goingToAbout ? "down" : "up");
      gsap.set(overlay, { display: "block", yPercent: goingToAbout ? -100 : 100 });
      gsap.to(overlay, {
        yPercent: 0, duration: 0.75, ease: "power4.inOut",
        onComplete: () => { window.location.href = href; }
      });
    });
  });
});
</script>

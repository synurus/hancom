<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>입력 type</title>
</head>
<body>
    <h1>입력 TYPE</h1>
    <form>
        <label>이메일 : <input type="email", placeholder="ex : 1234@gmail.com"></label>
        <br>
        <label>패스워드 : <input type="password"></label>
        <br>
        <label>동의 : <input type="checkbox"></label>
        <br>
        <label>성별 : <input type="radio" name="gender">남</label>
        <label><input type="radio" name="gender">여</label>
        <br>
        <label>생일 : <input type="date"></label>
        <br>
        <textarea>
        안녕하세요!
        </textarea>
        <br>
        <select>
            <option>서울</option>
            <option>부산</option>
            <option>경기</option
        </select>
    </form>
</body>
</html>

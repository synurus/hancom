<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>class 이름표</title>
</head>
<body>
    <h1>class</h1>
    <!-- class = 여러 요소가 함께 쓰는 이름표 (같은 값 여러 번 OK) -->
    <p class="text">111</p>
    <p class="text">222</p>
    <p class="text1">333</p>
    <p class="text2">444</p>
</body>
</html>

class="note" = 두 문단에 같은 이름표를 단 것 — 나중에 CSS로 note 하나만 꾸미면 둘 다 같이 바뀜

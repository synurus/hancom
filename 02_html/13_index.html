<!-- HTML 문서 선언 -->
<!DOCTYPE html>
<!-- 한글 문서 시작 -->
<html lang="ko">
    <!-- 화면에 안보이는 준비칸 -->
    <head>
        <!-- 한글 안깨지게 -->
        <meta charset="UTF-8">
        <!-- 브라우저 탭이름 -->
        <title>줄바꿈과 가로선</title>
    </head>
    <body>
        <!-- p = paragraph
             br = break     -->
        <p>1번 줄<br>2번 줄</p>
        <!-- hr = horizon -->
        <p>1번 줄<hr>2번 줄</p>
    </body>
</html>

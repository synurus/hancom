<!-- HTML 문서 선언 -->
<!DOCTYPE html>
<!-- 한글 문서 시작 -->
<html lang="ko">
    <!-- 화면에 안보이는 준비칸 -->
    <head>
        <!-- 한글 안 깨지게 -->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름 -->
        <title>강조와 중첩</title>
    </head>
    <!-- 화면에 보이는 내용칸 -->
    <body>
        <!-- 중첩: 태그 안에 태그 넣기, strong은 글자를 굵게 강조 -->
        <p>저는 <strong>정말</strong> 신납니다</p>
        <p>< > &</p>
        <p>&lt; &gt; &amp;</p>
    </body>
</html>

< > &는 HTML이 명령어로 착각함 — 글자 그대로 보이려면 약속된 기호(엔티티)로 바꿔 적음
• &lt; → <
• &gt; → >
• &amp; → &

<!-- HTML 문서 선언 -->
<!DOCTYPE html>
<!-- 한글 문서 시작 -->
<html lang="ko">
<!-- 화면에 안보이는칸 -->
<head>
    <!-- 한글 안깨지게 -->
    <meta charset="UTF-8">
    <!-- 브라우저 탭이름 -->
    <title>입력 폼</title>
</head>
<!-- 화면에 보이는칸 -->
<body>
    <!-- form = 입력칸 묶음 상자 -->
    <form>
        <!-- label = 설명 글자 / input = 글자 칸 -->
        <label>이름: <input type="text" placeholder="이름 입력"></label>
        <br>
        <!-- input type = number → 숫자 칸 -->
        <label>나이: <input type="number" placeholder="나이 입력"></label>
        <br>
        <hr>
        <button type="submit">보내기</button>
  </form>
</body>
</html>

type="text" = 글자 칸, type="number" = 숫자 칸 — placeholder = 칸이 비었을 때 보이는 흐린 안내 글자

<!-- HTML 문서 선언 -->
<!DOCTYPE html>
<!-- 한글 문서 시작 -->
<html lang="ko">
<!-- 화면에 안보이는칸 -->
<head>
    <!-- 한글 안깨지게 -->
    <meta charset="UTF-8">
    <!-- 브라우저 탭이름 -->
    <title>영상 넣기</title>
</head>
<!-- 화면에 보이는칸 -->
<body>
    <h1>유튜브 영상 가져오기</h1>
    <iframe width="480" height="270"
     src="https://www.youtube.com/embed/DuPjCb45PIo">

    </iframe>
    <br>
    <br>
</body>
</html>

width·height = 창 크기(가로·세로), src = 보여줄 영상 주소
→ 유튜브는 일반 주소가 아닌 embed 주소(youtube.com/embed/...)를 넣어야 화면에 떠

<!-- 팁 — 다른 영상은 유튜브에서 공유 → 퍼가기(embed) 누르면 <iframe> 코드를 그대로 줌 -->

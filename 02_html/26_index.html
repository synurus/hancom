<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>표 합치기</title>
</head>
<body>
    <h1>표 합치기</h1>
    <table border="1">
        <caption>성적표</caption>
        <thead>
            <tr>
                <!-- 가로 4칸을 하나로 합침 -->
                <th colspan="3">
                    성적표
                </th>
            </tr>
        </thead>
        <tbody>
            <tr><td rowspan="3">과목</td><td>국어</td><td>90</td></tr>
            <tr><td>영어</td><td>80</td></tr>
            <tr><td>수학</td><td>70</td></tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="2">총점</th>
                <td>240</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>

<thead> = 표 머리(제목 줄), <tbody> = 표 몸통(내용 줄) — 구역을 나눠 두면 표 뜻이 또렷

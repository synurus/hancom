<!DOCTYPE html>

<html lang="ko">

        <!-- 한글 안 깨지게 -->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름 -->

    <!-- 화면에 보이는 내용 칸 -->

        <a href="https://www.google.com">구글 바로가기</a>

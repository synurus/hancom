<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Color Planes — Ring / Flower / Sphere / Cylinder</title>
  <link rel="stylesheet" href="./styles/analysis.css">
</head>
<body>
  <div id="stage">
    <div class="hint">Scroll to align &nbsp;·&nbsp; Click a shape to switch</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="switcher" id="switcher"></div>
    <div class="custom-cursor" id="cursor"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
(function () {
  // ------------------------------------------------------------------
  // 1. 데이터: 16개 색상
  // ------------------------------------------------------------------
  const COLORS = [
    '#ff0000', '#ff6200', '#ffbf00', '#ddff00',
    '#80ff00', '#1eff00', '#00ff40', '#00ffa1',
    '#00ffff', '#009dff', '#0040ff', '#2200ff',
    '#8000ff', '#e100ff', '#ff00bf', '#ff005d'
  ];
  const N = COLORS.length;

  // ------------------------------------------------------------------
  // 2. Three.js 기본 셋업
  // ------------------------------------------------------------------
  const stage = document.getElementById('stage');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  stage.appendChild(renderer.domElement);

  const sceneGroup = new THREE.Group();
  scene.add(sceneGroup);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ------------------------------------------------------------------
  // 3. 파라미터 (원본 obys-fluid-gallery 의 controls 값과 유사하게)
  // ------------------------------------------------------------------
  const scale = 6.5;          // 도형 전체 크기 (원래 크기로 복원)
  const shapeSize = 1.0;
  const spread = 3.2;         // Horizontal(일렬) 배치 시 이미지 간 간격
  const inertia = 0.08;       // 스크롤 관성
  const fluidity = 0.07;      // 위치 보간 부드러움
  const rotationSpeed = 0.25; // 자동 회전 속도
  const parallax = 0.6;

  // ------------------------------------------------------------------
  // 4. Plane(색상 카드) 생성
  // ------------------------------------------------------------------
  const planes = [];

  for (let i = 0; i < N; i++) {
    const geometry = new THREE.PlaneGeometry(1.6, 1.6);
    const material = new THREE.MeshBasicMaterial({
      color: new THREE.Color(COLORS[i]),
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 1
    });
    const mesh = new THREE.Mesh(geometry, material);
    sceneGroup.add(mesh);

    // hover 시 나타나는 흰색 테두리 (plane보다 살짝 큰 사각형 외곽선)
    const borderGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-0.85, -0.85, 0.001),
      new THREE.Vector3( 0.85, -0.85, 0.001),
      new THREE.Vector3( 0.85,  0.85, 0.001),
      new THREE.Vector3(-0.85,  0.85, 0.001)
    ]);
    const borderMaterial = new THREE.LineBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0
    });
    const border = new THREE.LineLoop(borderGeometry, borderMaterial);
    mesh.add(border); // mesh의 자식으로 붙여서 위치/회전을 그대로 따라가게 함

    planes.push({
      mesh,
      border,
      colorIndex: i,
      targets: {
        Sphere:     { position: new THREE.Vector3(), quaternion: new THREE.Quaternion(), scale: 1 },
        Ring:       { position: new THREE.Vector3(), quaternion: new THREE.Quaternion(), scale: 1 },
        Flower:     { position: new THREE.Vector3(), quaternion: new THREE.Quaternion(), scale: 1 },
        Cylinder:   { position: new THREE.Vector3(), quaternion: new THREE.Quaternion(), scale: 1 },
        Horizontal: { position: new THREE.Vector3(), quaternion: new THREE.Quaternion(), scale: 1 }
      },
      finalTargetPos: new THREE.Vector3(),
      finalTargetQuat: new THREE.Quaternion(),
      randoms: { ringY: (Math.random() - 0.5) },
      hoverState: 0
    });
  }

  // ------------------------------------------------------------------
  // 5. 5가지 목표 좌표 계산 (Sphere / Ring / Flower / Cylinder / Horizontal)
  // ------------------------------------------------------------------
  function calculateTargets() {
    const dummy = new THREE.Object3D();

    for (let i = 0; i < N; i++) {
      const plane = planes[i];

      // --- Sphere: 피보나치(황금각) 격자로 구 표면에 고르게 분포 ---
      const phi = Math.acos(1 - 2 * (i + 0.5) / N);
      const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);
      plane.targets.Sphere.position.set(
        scale * Math.cos(theta) * Math.sin(phi),
        scale * Math.sin(theta) * Math.sin(phi),
        scale * Math.cos(phi)
      );
      dummy.position.copy(plane.targets.Sphere.position);
      dummy.lookAt(0, 0, 0);
      dummy.rotateY(Math.PI);
      plane.targets.Sphere.quaternion.copy(dummy.quaternion);

      // --- Ring: 단순 원형 배치 ---
      const angle = (i / N) * Math.PI * 2;
      const rX = scale * 1.5;
      const rZ = scale * 1.8;
      plane.targets.Ring.position.set(
        Math.cos(angle) * rX,
        plane.randoms.ringY * scale * 0.4,
        Math.sin(angle) * rZ
      );
      dummy.position.copy(plane.targets.Ring.position);
      dummy.lookAt(0, dummy.position.y, 0);
      plane.targets.Ring.quaternion.copy(dummy.quaternion);

      // --- Flower: 골든 앵글 나선 (해바라기씨 패턴) ---
      const t = i / Math.max(1, N - 1);
      const goldenAngle = Math.PI * (3 - Math.sqrt(5));
      const flowerTheta = i * goldenAngle;
      const r = Math.pow(t, 1.4) * scale * 2.2;
      plane.targets.Flower.position.set(
        Math.cos(flowerTheta) * r,
        Math.sin(flowerTheta) * r,
        Math.sin(t * Math.PI * 5) * scale * 0.25
      );
      dummy.position.copy(plane.targets.Flower.position);
      dummy.lookAt(
        Math.cos(flowerTheta) * r * 2,
        Math.sin(flowerTheta) * r * 2,
        10 + scale
      );
      plane.targets.Flower.quaternion.copy(dummy.quaternion);

      // --- Cylinder: 여러 개의 링을 y축으로 쌓은 원통 ---
      const cylinderRadius = scale * 0.8;
      const cylinderHeight = scale * 3;
      const numRings = Math.max(3, Math.floor(Math.sqrt(N)));
      const imagesPerRing = Math.ceil(N / numRings);
      const ringIndex = Math.floor(i / imagesPerRing);
      const indexInRing = i % imagesPerRing;
      const cylinderAngle = (indexInRing / imagesPerRing) * Math.PI * 2;
      const yPos = (numRings > 1) ? (ringIndex / (numRings - 1) - 0.5) * cylinderHeight : 0;
      plane.targets.Cylinder.position.set(
        Math.cos(cylinderAngle) * cylinderRadius,
        yPos,
        Math.sin(cylinderAngle) * cylinderRadius
      );
      dummy.position.copy(plane.targets.Cylinder.position);
      dummy.lookAt(0, dummy.position.y, 0);
      plane.targets.Cylinder.quaternion.copy(dummy.quaternion);

      // --- Horizontal: 스크롤 시 도달할 일렬 정렬 좌표 ---
      plane.targets.Horizontal.position.set(i * spread, 0, 0);
      dummy.position.copy(plane.targets.Horizontal.position);
      dummy.rotation.set(0, 0, 0);
      plane.targets.Horizontal.quaternion.copy(dummy.quaternion);
    }
  }
  calculateTargets();

  // ------------------------------------------------------------------
  // 6. 상태(모양) 스위처 UI
  // ------------------------------------------------------------------
  const states = ['Ring', 'Flower', 'Sphere', 'Cylinder'];
  let activeState = 'Ring';
  const switcherEl = document.getElementById('switcher');
  const buttons = {};

  states.forEach((state, i) => {
    const item = document.createElement('span');
    item.className = 'item' + (state === activeState ? ' active' : '');
    item.textContent = state;
    item.addEventListener('click', () => {
      activeState = state;
      targetScrollValue = 0;           // 새 모양을 보여주기 위해 스크롤 리셋
      updateSwitcherUI();
    });
    switcherEl.appendChild(item);
    buttons[state] = item;
    if (i < states.length - 1) {
      const comma = document.createElement('span');
      comma.className = 'comma';
      comma.textContent = ',';
      switcherEl.appendChild(comma);
    }
  });

  function updateSwitcherUI() {
    states.forEach(s => buttons[s].classList.toggle('active', s === activeState));
  }

  // ------------------------------------------------------------------
  // 7. 마우스 휠 → 스크롤 값 누적 (원본과 동일한 아이디어)
  // ------------------------------------------------------------------
  let targetScrollValue = 0;
  let currentScroll = 0;
  const maxScroll = N; // 1: 모양→일렬 변형 완료 지점, 이후: 일렬 상태에서 카메라 이동

  window.addEventListener('wheel', (e) => {
    e.preventDefault();
    targetScrollValue += e.deltaY * 0.002;
    targetScrollValue = Math.max(0, Math.min(maxScroll, targetScrollValue));
  }, { passive: false });

  // 마우스 패럴랙스 + 레이캐스팅용 좌표
  const mouse = { x: 0, y: 0 };
  const raycaster = new THREE.Raycaster();

  // 커스텀 커서 (흰 원)
  const cursorEl = document.getElementById('cursor');
  const cursor = { x: window.innerWidth / 2, y: window.innerHeight / 2, targetX: 0, targetY: 0 };
  cursor.targetX = cursor.x;
  cursor.targetY = cursor.y;

  window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    cursor.targetX = e.clientX;
    cursor.targetY = e.clientY;
  });

  // ------------------------------------------------------------------
  // 8. 애니메이션 루프
  // ------------------------------------------------------------------
  const progressFill = document.getElementById('progressFill');
  let globalAngle = 0;
  const clock = new THREE.Clock();
  const cameraTarget = new THREE.Vector3();

  function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const time = clock.elapsedTime;

    globalAngle += rotationSpeed * delta * 0.5;

    // 관성 적용한 스크롤 값
    currentScroll += (targetScrollValue - currentScroll) * inertia;

    // 스크롤 값을 두 구간으로 분리
    let transitionProgress, archiveProgress;
    if (currentScroll <= 1) {
      transitionProgress = currentScroll;      // 0→1: 모양 → 일렬로 변형
      archiveProgress = 0;
    } else {
      transitionProgress = 1;                  // 완전히 일렬 정렬됨
      archiveProgress = currentScroll - 1;      // 1 이후: 카메라가 옆으로 훑기
    }
    transitionProgress = Math.max(0, Math.min(1, transitionProgress));
    archiveProgress = Math.max(0, Math.min(N - 1, archiveProgress));

    progressFill.style.width = (currentScroll / maxScroll * 100) + '%';

    const rotQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), globalAngle);
    const effectiveSpread = spread * shapeSize;
    const baseZ = 30; // 카메라 거리 고정값 (도형이 화면 안에 넉넉히 들어오도록)

    // 현재 마우스 위치에서 레이를 쏴서 어떤 plane 위에 있는지 탐지
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(sceneGroup.children, false);
    const hoveredPlane = intersects.length > 0
      ? planes.find(p => p.mesh === intersects[0].object)
      : null;

    for (let i = 0; i < planes.length; i++) {
      const plane = planes[i];

      // hover 상태를 부드럽게 0→1로 보간
      const hoverTarget = (plane === hoveredPlane) ? 1 : 0;
      plane.hoverState += (hoverTarget - plane.hoverState) * fluidity * 3.0;

      // 현재 선택된 모양 좌표에 살짝 떠다니는 느낌(floating) 추가
      const spatialPos = plane.targets[activeState].position.clone().multiplyScalar(shapeSize);
      const floatAmt = (1 - transitionProgress) * 0.05 * scale * shapeSize;
      spatialPos.x += Math.sin(time * 0.5 + i) * floatAmt;
      spatialPos.y += Math.sin(time * 0.6 + i) * floatAmt;
      spatialPos.z += Math.sin(time * 0.7 + i) * floatAmt;
      spatialPos.applyQuaternion(rotQuat);

      const spatialQuat = plane.targets[activeState].quaternion.clone();
      spatialQuat.premultiply(rotQuat);

      const horizPos = plane.targets.Horizontal.position.clone().multiplyScalar(shapeSize);
      const horizQuat = plane.targets.Horizontal.quaternion;

      // 모양 좌표 ↔ 일렬 좌표를 transitionProgress 비율로 보간
      plane.finalTargetPos.lerpVectors(spatialPos, horizPos, transitionProgress);
      plane.finalTargetQuat.slerpQuaternions(spatialQuat, horizQuat, transitionProgress);

      plane.mesh.position.lerp(plane.finalTargetPos, fluidity);
      plane.mesh.quaternion.slerp(plane.finalTargetQuat, fluidity);

      // 스케일도 모양 상태 ↔ 일렬 상태 사이 보간 + hover 시 확대
      const shapeScale = 1 * shapeSize;
      const horizScale = 1 * shapeSize;
      let targetScale = THREE.MathUtils.lerp(shapeScale, horizScale, transitionProgress);
      targetScale *= 1 + plane.hoverState * 0.35; // hover 시 35% 확대
      plane.mesh.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), fluidity);

      // hover 시 흰색 테두리 표시 (기존의 "흐림→선명" 대신)
      plane.border.material.opacity = plane.hoverState;
    }

    // 커스텀 커서: 위치를 부드럽게 따라가고, plane 위에 있으면 커짐
    cursor.x += (cursor.targetX - cursor.x) * 0.2;
    cursor.y += (cursor.targetY - cursor.y) * 0.2;
    cursorEl.style.transform = `translate3d(${cursor.x}px, ${cursor.y}px, 0) translate(-50%, -50%)`;
    cursorEl.classList.toggle('is-hover', !!hoveredPlane);

    // 카메라: 일렬 상태(archiveProgress)에서는 옆으로 이동하며 훑어보기
    const parallaxMult = 1;
    const targetCamX = archiveProgress * effectiveSpread + (mouse.x * parallax * scale * 0.3 * parallaxMult);
    const targetCamY = (mouse.y * parallax * scale * 0.3 * parallaxMult);
    camera.position.x += (targetCamX - camera.position.x) * fluidity;
    camera.position.y += (targetCamY - camera.position.y) * fluidity;
    camera.position.z += (baseZ - camera.position.z) * fluidity;

    cameraTarget.set(
      archiveProgress * effectiveSpread + mouse.x * parallax * 0.3,
      mouse.y * parallax * 0.3,
      0
    );
    camera.lookAt(cameraTarget);

    renderer.render(scene, camera);
  }

  camera.position.set(0, 0, 30);
  animate();
})();
  </script>
</body>
</html>

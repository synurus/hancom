<!-- HTML 문서 선언 -->
<!DOCTYPE html>
<!-- 한글 문서 시작 -->
<html lang="ko">
    <!-- 화면에 안보이는 준비 칸 -->
    <head>
        <!-- 한글 안깨지게 -->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름 -->
        <title>목록 및 시맨틱</title>
    </head>
    <!-- 화면에 보이는 내용 칸 -->
    <body>
        <!-- 페이지 맨 위 구역 -->
        <header>
            맨 위 (로고 혹은 제목)
        </header>
        <!-- 페이지 핵심 내용 구역 -->
        <main>
            <ul>
                <li>3 + 2 = 5</li>
                <li>3 - 2 = 1</li>
                <li>3 * 2 = 6</li>
            </ul>
        </main>
        <!-- 페이지 맨 아래 구역 -->
        <footer>
            맨 아래 (저작권 및 연락처)
        </footer>
    </body>
</html>

외울 거 = "위는 header, 본문은 main, 아래는 footer" — 어디에 둘지 모르면 일단 main 안에

블록 요소(p·h1·ul·header)는 벽돌처럼 한 줄을 통째로 차지(위→아래로 쌓임),
인라인 요소(a·strong·em)는 글자 사이에 끼어듦

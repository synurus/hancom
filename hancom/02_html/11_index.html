<!-- HTML 문서 선언 -->
<!DOCTYPE html>
<!-- 한글 문서 시작 -->
<html lang="ko">
    <!-- 화면에 안보이는 준비 칸 -->
    <head>
        <!-- 한글 안 깨지게 -->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름 -->
        <title>내 소개</title>
    </head>
    <!-- 화면에 보이는 내용 칸 -->
    <body>
        <header>
            <h1>이현우의 소개 페이지</h1>
        </header>
        <main>
            <img src="./image.jpg" alt="프로필 사진" style="width: 20%; height: auto;">
            <p>안녕하세요. 저는 웹 개발을 배우는 이현우입니다.</p>
            <ul>
                <li>취미 : 게임과 만화</li>
                <li>좋아하는 게임 장르 : FPS</li>
                <li>좋아하는 만화 장르 : 판타지</li>
                <li>목표 : AI 개발 능력 학습</li>
            </ul>
        </main>
        <footer>
            <a href="https://blog.naver.com/hwlee363/">블로그 보러가기</a>
        </footer>
    </body>
</html>

요소 : 여는 태그 + 내용 + 닫는 태그
빈 요소 : <img/>, <meta/>
시맨틱 : <header></header>, <main></main>, <footer></footer>
속성 : 태그 안에 들어가는 값 | ex : <a href="https://blog.naver.com/hwlee363/"></a>

<!DOCTYPE html>                             <!-- HTML 문서 선언 -->
<html lang="ko">                            <!-- 문서 시작, 한국어 페이지 -->
    <head>                                  <!-- 화면에 안보이는 준비 칸 -->
        <meta charset="UTF-8">              <!-- 한글 안 깨지게 -->
        <title>                             
            제목과 문단
        </title>                            <!-- 브라우저 탭 이름 -->
    </head>
    <!-- 화면에 보이는 내용 칸 -->
    <body>                        
        <!-- 제목은 크기 6단계: h1이 제일 크고 숫자 커질수록 작아짐 -->
        <h1>
            1 가장 큰 제목
        </h1>
        <h2>
            2 중간 제목
        </h2>
        <h3>
            3 작은 제목
        </h3>
        <h4>
            4 작은 제목
        </h4>
        <h5>
            5 작은 제목
        </h5>
        <h6>
            6 작은 제목(6단계 까지 존재)
        </h6>
        <!-- 문단(글 한 덩어리) -->
        <p>
            저는 코딩을 처음 배우는 학생입니다
        </p>
    </body>
</html>

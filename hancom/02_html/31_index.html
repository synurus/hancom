<!-- 뼈대 자동완성 !+Tab -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- LIST 만들기 ul>li*갯수 -->
     <ul>
        <li></li>
        <li></li>
        <li></li>
     </ul>
     
     <!-- CLASS 자동완성 .box .card .text-->
      <div class="box"></div>
      <div class="card"></div>
      <div class="text"></div>

    <!-- ID 자동완성 #top  -->
     <div id="top"></div>
     <div id="bottom"></div>

    <!-- h1{내용} -->
    <h1>타이틀</h1>

    <!-- 태그{내용} -->
    <div>타이틀</div>

    <!-- 태그[속성=#] -->
    <!-- 태그+Enter -->
    <a href=""></a>
    <audio src=""></audio>
</body>
</html>

<!-- 
• >      — 안에 넣기(자식). ul>li = ul 안에 li
• *N     — N번 반복. li*3 = li 3개
• .이름   — class 붙이기. .box = class="box"
• #이름   — id 붙이기. #top = id="top"
• {글자}  — 태그 안의 내용. h1{안녕} = <h1>안녕</h1>
• [속성]  — 속성 넣기. a[href=#] = href="#"
-->

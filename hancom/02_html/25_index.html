<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글자 꾸미기</title>
</head>
<body>
    <h1>글자 꾸미기</h1>
    <p><em>기울임 강조</em></p>
    <p><mark>형광펜</mark></p>
    <p><small>작은 글씨</small></p>
    <blockquote>인용문</blockquote>
    <p>H<sub>2</sub>O</p>
    <p>X<sup>2</sup>O</p>
</body>
<br><br>
</html>

<!-- 
• <em> 기울임 강조 · <mark> 형광펜 · <small> 작게
• <code> 코드 글씨 · <blockquote> 인용 덩어리
• <sub> 아래첨자(H<sub>2</sub>O) · <sup> 위첨자(x<sup>2</sup>)
 -->

<!-- HTML 문서 선언 -->
<!DOCTYPE html>
<!-- 한글 문서 시작 -->
<html lang="ko">
    <!-- 화면에 안보이는 준비칸 -->
    <head>
        <!-- 한글 안 깨지게 -->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름 -->
        <title>이미지 넣기</title>
    </head>
    <!-- 화면에 보이는 내용칸 -->
    <body>
        <!-- 화면에 사진 붙이기, 닫는 태그 없는 빈 요소라 /> 로 끝맺음 -->
        <!-- src = 사진주소 / alt = 사진 주소 오류시 대신 보일 텍스트 -->
        <img src="./image.jpg" alt="예시 사진" style="width: 100%; height: auto;">
    </body>
</html>

<img>는 속이 빈 상자처럼 넣을 내용이 없어 닫는 태그도 안 쓰는 빈 요소(void), 끝을 />로 마감 — br·hr·meta도 빈 요소(/는 생략 가능)

<!doctype html>                 <!-- HTML 문서 -->
<html lang="ko">                <!-- 문서 시작, 한국어 페이지 -->
  <head>                        <!-- 화면에 보이지 않는 준비 칸 -->
    <meta charset="UTF-8" />    <!-- 한글 안 깨지게 -->
    <title>태그 연습</title>     <!-- 브라우저 탭 이름 -->
  </head>
  <body>                        <!-- 화면에 보이는 내용 칸 -->
    <h1>
        안녕하세요
    </h1>
  </body>
</html>

- 요소(element) = 여는 태그 + 내용 + 닫는 태그
- 태그 이름은 대소문자 가리지 않는다 (H1 = h1)
- 눈에 보이는 건 전부 <body> 안에, <head>는 무대 뒤 준비 공간
